      <stop offset="0%" stop-color="#5a3722"/>
      <stop offset="55%" stop-color="#18100b"/>
      <stop offset="100%" stop-color="#050302"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
